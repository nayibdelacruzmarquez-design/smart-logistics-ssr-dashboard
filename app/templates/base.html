<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Logistics SSR{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-950 p-6 flex flex-col gap-4 border-r border-slate-800">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-sky-500 rounded-full pulse-live"></div>
                <h2 class="text-xl font-bold text-sky-400">⚡ Nexus Logistic</h2>
            </div>
            <nav class="flex flex-col gap-2 mt-4">
                <a href="#" class="bg-sky-600 px-4 py-2 rounded text-white font-medium transition hover:bg-sky-500">📊 Dashboard</a>
                <a href="#" class="text-slate-400 hover:text-white px-4 py-2 rounded transition hover:bg-slate-900">📦 Inventario</a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
